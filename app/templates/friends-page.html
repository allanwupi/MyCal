{% extends "layout.html" %}

{% block content %}
<div class="container py-4">

  <h2 class="mb-4">Friends Availability</h2>

  <div class="card p-3 mb-4 shadow-sm">
    <h5>Search Users</h5>
    <input type="text" id="searchInput" class="form-control mb-2" placeholder="Search by username...">
    <div id="searchResults"></div>
  </div>

  <div class="card p-3 mb-4 shadow-sm">
    <h5>Your Friends</h5>
    <p class="text-muted">Select up to 3 friends to compare calendars.</p>
    <div id="friendsList"></div>
  </div>

  <div class="card p-3 mb-4 shadow-sm">
    <h5>Selected Friends</h5>
    <div id="compareList"></div>
    <button id="compareBtn" class="btn btn-primary mt-3">Compare Availability</button>
  </div>

  <div class="card p-3 shadow-sm">
    <h5>Weekly Availability</h5>
    <p class="text-muted">
      Green = everyone is free, red = someone is busy.
    </p>
    <div id="availabilityCalendar"></div>
  </div>

</div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="{{ url_for('static', filename='friends.js') }}"></script>
{% endblock %}
