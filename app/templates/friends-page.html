{% extends "layout.html" %}
{% block title %}Friends{% endblock %}

{% block content %}
<div class="friends-page">
  <div class="friends-header">
    <h1>Friends</h1>
    <p>Search for users by username, add them as friends, and manage your friends list.</p>
  </div>

  <div class="friends-grid">
    <section class="friends-card">
      <h2>Search Users</h2>

      <input
        type="text"
        id="friendSearchInput"
        class="friends-input"
        placeholder="Search by username..."
      >

      <div id="friendSearchResults" class="friends-results"></div>
    </section>

    <section class="friends-card">
      <h2>Your Friends</h2>
      <p class="friends-muted">Users you have added as friends.</p>

      <div id="friendsList" class="friends-list"></div>
    </section>
  </div>
</div>
{% endblock %}

{% block javascript %}
<script src="{{ url_for('static', filename='friends.js') }}"></script>
{% endblock %}
