{% extends "layout.html" %} {% block title %}Calendar{% endblock %} {% block
head %} {% endblock %} {% block content %}
<div
  class="section-title d-flex justify-content-between align-items-center flex-wrap gap-3"
>
  <div>
    <h2>Calendar</h2>
    <p>
      View your schedule by month, week, or day and hover events for extra
      details.
    </p>
  </div>
  <button class="primary-btn" id="openEventModalBtn">+ Add Event</button>
</div>
<div class="glass-card">
  <div id="calendar"></div>
</div>

<div id="eventTooltip" class="event-tooltip"></div>
<!-- Add Event Modal -->
<div
  class="modal fade"
  id="addEventModal"
  tabindex="-1"
  aria-labelledby="addEventModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content rounded-4 border-0 shadow">
      <div class="modal-header">
        <h5 class="modal-title" id="addEventModalLabel">Add Event or Task</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label for="eventTitle" class="form-label">Event Title</label>
          <input
            type="text"
            class="form-control"
            id="eventTitle"
            placeholder="Enter event title (required)"
          />
        </div>

        <div class="mb-3">
          <label for="eventStart" class="form-label">Start</label>
          <input type="datetime-local" class="form-control" id="eventStart" />
        </div>

        <div class="mb-3">
          <label for="eventEnd" class="form-label">End</label>
          <input type="datetime-local" class="form-control" id="eventEnd" />
        </div>

        <div class="mb-3">
          <label for="eventLocation" class="form-label">Location</label>
          <input
            type="text"
            class="form-control"
            id="eventLocation"
            placeholder="Enter location (optional)"
          />
        </div>

        <div class="mb-3">
          <label for="eventDescription" class="form-label">Details</label>
          <textarea
            class="form-control"
            id="eventDescription"
            rows="3"
            placeholder="Enter event details (optional)"
          ></textarea>
        </div>

        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="True" id="eventIsTask">
            <label class="form-check-label" for="eventIsTask">
              Add as Task (only due date will be saved)
            </label>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary rounded-pill px-4"
          data-bs-dismiss="modal"
        >
          Cancel
        </button>
        <button type="button" class="primary-btn" id="saveEventBtn">
          Save Event
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %} {% block javascript %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="{{ url_for('static', filename='calendar.js') }}"></script>
{% endblock %}
