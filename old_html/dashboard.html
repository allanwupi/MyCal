<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f6fa;
    }

    .calendar {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    .calendar-table th, .calendar-table td {
      height: 100px;
      text-align: center;
      vertical-align: top;
    }

    .calendar-table th {
      background-color: #343a40;
      color: white;
    }

    .calendar-table td {
      border: 1px solid #dee2e6;
      font-size: 14px;
      overflow: hidden;
    }

    .calendar-table td small {
      display: block;
      margin-top: 5px;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .calendar-header h3 {
      margin: 0;
      flex-grow: 1;
      text-align: center;
    }

    .calendar-table td:hover {
      background-color: #e9ecef;
      cursor: pointer;
    }

    /* Event boxes */
    .event {
      font-size: 11px;
      padding: 2px 5px;
      border-radius: 5px;
      margin-top: 3px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">CalendarApp</span>

    <form class="d-flex ms-auto">
      <input class="form-control me-2" type="search" placeholder="Search tasks...">
      <button class="btn btn-outline-light">Search</button>
    </form>

    <button class="btn btn-outline-light ms-3">Logout</button>
  </div>
</nav>

<div class="container-fluid mt-4">
  <div class="row">

    <!-- 🔹 TO-DO LIST -->
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <a href="todo.html" class="text-white text-decoration-none">
            To-Do List
          </a>
        </div>

        <div class="card-body">
          <input type="text" class="form-control mb-2" placeholder="New task...">
          <input type="date" class="form-control mb-3">
          <button class="btn btn-primary w-100 mb-3">Add Task</button>

          <ul class="list-group">
            <li class="list-group-item">
              Finish assignment
              <span class="badge bg-warning text-dark float-end">In Progress</span>
            </li>
            <li class="list-group-item">
              Gym
              <span class="badge bg-info text-dark float-end">Not Started</span>
            </li>
            <li class="list-group-item text-decoration-line-through text-muted">
              Study
              <span class="badge bg-success float-end">Done</span>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 🔹 CALENDAR -->
    <div class="col-md-9">
      <div class="calendar shadow-sm">

        <!-- Header -->
        <div class="calendar-header mb-3">

          <button class="btn btn-outline-secondary">&lt;</button>

          <h3>
            <a href="calendar.html" class="text-dark text-decoration-none">
              April 2026
            </a>
          </h3>

          <button class="btn btn-outline-secondary">&gt;</button>

          <button class="btn btn-primary">Week/Month</button>

        </div>

        <!-- Calendar Table -->
        <table class="table table-bordered calendar-table">
          <thead>
            <tr>
              <th>Sun</th>
              <th>Mon</th>
              <th>Tue</th>
              <th>Wed</th>
              <th>Thu</th>
              <th>Fri</th>
              <th>Sat</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td></td><td></td><td></td>
              <td><strong>1</strong></td>
              <td><strong>2</strong></td>
              <td><strong>3</strong></td>
              <td><strong>4</strong></td>
            </tr>

            <tr>
              <td class="bg-warning-subtle">
                <strong>5</strong>
                <div class="event bg-warning text-dark"
                     data-bs-toggle="tooltip"
                     title="Assignment Due - 11:59PM">
                  Assignment
                </div>
              </td>

              <td class="bg-info-subtle">
                <strong>6</strong>
                <div class="event bg-info text-dark"
                     data-bs-toggle="tooltip"
                     title="Gym - 6:00PM">
                  Gym
                </div>
              </td>

              <td>
                <strong>7</strong>

                <div class="event bg-primary text-white"
                     data-bs-toggle="tooltip"
                     title="CITS2200 - 10:00AM-12:00PM @ Lecture Hall">
                  Algorithms
                </div>

                <div class="event bg-success text-white"
                     data-bs-toggle="tooltip"
                     title="CITS3000 Lab - 2:00PM-4:00PM @ Lab 3">
                  Lab
                </div>
              </td>

              <td><strong>8</strong></td>
              <td><strong>9</strong></td>
              <td><strong>10</strong></td>
              <td><strong>11</strong></td>
            </tr>

            <tr>
              <td><strong>12</strong></td>
              <td><strong>13</strong></td>
              <td><strong>14</strong></td>

              <td class="bg-success-subtle">
                <strong>15</strong>
                <div class="event bg-success text-white"
                     data-bs-toggle="tooltip"
                     title="Meeting - 1:00PM @ Library">
                  Meeting
                </div>
              </td>

              <td><strong>16</strong></td>
              <td><strong>17</strong></td>
              <td><strong>18</strong></td>
            </tr>

            <tr>
              <td><strong>19</strong></td>
              <td><strong>20</strong></td>
              <td><strong>21</strong></td>
              <td><strong>22</strong></td>

              <td class="bg-danger-subtle">
                <strong>23</strong>
                <div class="event bg-danger text-white"
                     data-bs-toggle="tooltip"
                     title="Deadline - 5:00PM">
                  Deadline
                </div>
              </td>

              <td><strong>24</strong></td>
              <td><strong>25</strong></td>
            </tr>

            <tr>
              <td><strong>26</strong></td>
              <td><strong>27</strong></td>
              <td><strong>28</strong></td>
              <td><strong>29</strong></td>
              <td><strong>30</strong></td>
              <td></td>
              <td></td>
            </tr>
          </tbody>
        </table>

      </div>
    </div>

  </div>
</div>

<!-- 🔹 Bootstrap JS (for tooltips) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
  tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el))
</script>

</body>
</html>
