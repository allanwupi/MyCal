<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Share & Import</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- share canlender part -->
<div class="container main-box">

    <h1 class="page-title">Share & Import Calendars</h1>

    <div class="section">
        <h3>Share Calendar</h3>

        <input type="text" class="form-control input-box" placeholder="Enter username">

        <select class="form-select input-box">
            <option>Friends</option>
            <option>Public</option>
        </select>

        <button class="btn btn-primary">Share</button>
    </div>

    <!-- import the calender -->
    <div class="section">
        <h3>Import Calendar</h3>

        <button class="btn btn-secondary input-box">Choose File (.)</button>

        <select class="form-select input-box">
            <option>aaa</option>
            <option>Google Calendar</option>
        </select>

        <button class="btn btn-success">Import</button>
    </div>

    <!-- see other canlender -->
    <div class="section">
        <h3>Shared Calendars</h3>

        <table class="table table-bordered">
            <tr>
                <th>User</th>
                <th>Description</th>
                <th>Action</th>
            </tr>
            <tr>
                <td>Hongshen</td>
                <td>Study Plan</td>
                <td><button class="btn btn-sm btn-outline-primary">View</button></td>
            </tr>
        </table>
    </div>

</div>
<img src="calendar2026.jpg"  class="img-box">

</body>
</html>
