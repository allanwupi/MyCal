<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>

  <!--Bootstrap CSS--> 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .task-item:hover {
      background-color: #f1f3f5;
      cursor: pointer;
    }
  </style>
</head>

<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <h1 class="text-center mb-4">To-Do List</h1>

      <!-- Input Section -->
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <input type="text" class="form-control mb-3" placeholder="Add a new task...">
          <input type="date" class="form-control mb-3">
          <button class="btn btn-primary w-100">Add Task</button>
        </div>
      </div>

      <!-- Filter Buttons -->
      <div class="d-flex justify-content-between mb-3">
        <button class="btn btn-outline-secondary btn-sm">All</button>
        <button class="btn btn-outline-secondary btn-sm">Pending</button>
        <button class="btn btn-outline-secondary btn-sm">Completed</button>
      </div>

      <!-- Task List -->
      <ul class="list-group">

        <!-- Task 1 -->
        <li class="list-group-item d-flex justify-content-between align-items-center task-item"
            data-bs-toggle="tooltip"
            title="Task: Finish assignment | Due: April 5">

          <div>
            <p class="mb-1 fw-bold">Finish assignment</p>
            <small class="text-muted">Due: April 5</small>
          </div>

          <div class="d-flex gap-2">
            <!-- Dropdown -->
            <div class="dropdown">
              <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                Status
              </button>

              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-info text-dark">Not Started</span>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-warning text-dark">In Progress</span>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-success">Completed</span>
                  </a>
                </li>
              </ul>
            </div>

            <button class="btn btn-danger btn-sm">✕</button>
          </div>
        </li>

        <!-- Task 2 -->
        <li class="list-group-item d-flex justify-content-between align-items-center task-item"
            data-bs-toggle="tooltip"
            title="Task: Go to gym | Due: April 6">

          <div>
            <p class="mb-1 fw-bold">Go to gym</p>
            <small class="text-muted">Due: April 6</small>
          </div>

          <div class="d-flex gap-2">
            <div class="dropdown">
              <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                Status
              </button>

              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-info text-dark">Not Started</span>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-warning text-dark">In Progress</span>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-success">Completed</span>
                  </a>
                </li>
              </ul>
            </div>

            <button class="btn btn-danger btn-sm">✕</button>
          </div>
        </li>

        <!-- Task 3 -->
        <li class="list-group-item d-flex justify-content-between align-items-center task-item"
            data-bs-toggle="tooltip"
            title="Task: Study for test | Due: April 3">

          <div>
            <p class="mb-1 fw-bold text-decoration-line-through text-muted">Study for test</p>
            <small class="text-muted">Due: April 3</small>
          </div>

          <div class="d-flex gap-2">
            <div class="dropdown">
              <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                Status
              </button>

              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-info text-dark">Not Started</span>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-warning text-dark">In Progress</span>
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="#">
                    <span class="badge bg-success">Completed</span>
                  </a>
                </li>
              </ul>
            </div>

            <button class="btn btn-danger btn-sm">✕</button>
          </div>
        </li>

      </ul>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
  tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el))
</script>

</body>
</html>
