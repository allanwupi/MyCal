{% extends "layout.html" %}

{% block content %}
<div class="friends-page">
  <div class="friends-header">
    <h1>Friends</h1>
    <p>Search, add friends, and compare weekly availability.</p>
  </div>

  <div class="friends-grid">
    <section class="friends-card">
      <h2>Search Users</h2>
      <input
        type="text"
        id="friendSearchInput"
        class="friends-input"
        placeholder="Search by username..."
      >
      <div id="friendSearchResults" class="friends-results"></div>
    </section>

    <section class="friends-card">
      <h2>Your Friends</h2>
      <p class="friends-muted">Select up to 3 friends to compare.</p>
      <div id="friendsList" class="friends-list"></div>
    </section>

    <section class="friends-card">
      <h2>Selected Friends</h2>
      <div id="selectedFriendsList" class="friends-list"></div>
      <button id="compareFriendsBtn" class="friends-primary-btn">
        Compare Availability
      </button>
    </section>
  </div>

  <section class="friends-card calendar-card">
    <h2>Weekly Availability</h2>
    <p class="friends-muted">Green = everyone is free, red = someone is busy.</p>
    <div id="friendsAvailabilityCalendar"></div>
  </section>
</div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="{{ url_for('static', filename='friends.js') }}"></script>
{% endblock %}
