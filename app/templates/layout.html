<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}{% endblock %}</title>
  <script>
    (function () {
      var match = document.cookie.match(/(?:^|; )sidebar_collapsed=([^;]+)/);
      if (!match) return;

      if (decodeURIComponent(match[1]) === '1') {
        document.documentElement.classList.add('sidebar-collapsed');
      }
    })();
  </script>
  {% block head %}{% endblock %}
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-text">
            <h2>MyCal</h2>
            <p>Schedule dashboard</p>
          </div>
        </div>
        <button class="toggle-btn" id="toggleSidebar">☰</button>
      </div>

	  <!-- Sidebar with navigation links, shared across pages -->
      <ul class="nav-links">
        <li data-section="calendar-section">
          <a {% if calendar_active is defined %} class="active" {% endif %} href="calendar">
          <span class="nav-icon">📅</span>
          <span class="label">Calendar</span>
          </a>
        </li>
        <li data-section="todo-section">
          <a {% if todo_active is defined %} class="active" {% endif %} href="todo">
            <span class="nav-icon">✅</span>
            <span class="label">To-do List</span>
          </a>
        </li>
        <li data-section="friends-section">
          <a {% if friends_active is defined %} class="active" {% endif %} href="friends">
            <span class="nav-icon">👥</span>
            <span class="label">Friends</span>
          </a>
        </li>
        <li data-section="import-section">
          <a {% if import_active is defined %} class="active" {% endif %} href="import">
            <span class="nav-icon">📥</span>
            <span class="label">Import Calendar</span>
          </a>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="topbar">
        <div>
          <h1>My Dashboard</h1>
          <p>Manage your schedule, tasks, friends, and imported calendars in one place.</p>
        </div>
      </div>
      <div id="content">{% block content %}{% endblock %}</div>
	  </main>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='sidebar.js') }}"></script>
  {% block javascript %}{% endblock %}
</body>
</html>
